name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm test

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - run: docker build -t sparklebot:ci .

      - name: Verify container starts
        run: |
          docker run -d --name sparklebot-test \
            -e SPARKLE_SESSION_SECRET=ci-test \
            -e PORT=3000 \
            -p 3000:3000 \
            sparklebot:ci
          for i in $(seq 1 10); do
            if curl -sf http://localhost:3000/healthz; then
              echo " healthz OK"
              exit 0
            fi
            sleep 1
          done
          echo "healthz failed, container logs:"
          docker logs sparklebot-test
          exit 1

      - name: Cleanup
        if: always()
        run: docker stop sparklebot-test 2>/dev/null || true

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - run: helm lint helm/sparklebot/

      - run: helm template sparklebot helm/sparklebot/ > /dev/null
