name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm test

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t sparklebot:ci .

      - name: Verify image structure
        run: |
          docker run --rm --entrypoint node sparklebot:ci -e "
            const fs = require('fs');
            const required = ['src/app.js', 'src/config.js', 'src/db.js', 'src/messages.js', 'src/handlers/sparkle.js', 'src/handlers/leaderboard.js'];
            const missing = required.filter(f => !fs.existsSync(f));
            if (missing.length) { console.error('Missing files:', missing); process.exit(1); }
            console.log('All required files present');
          "

  helm-lint:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v4

      - run: helm lint helm/sparklebot/

      - run: helm template sparklebot helm/sparklebot/ > /dev/null
