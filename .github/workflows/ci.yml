name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm test

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - run: docker build -t sparklebot:ci .

      - name: Verify container starts
        run: |
          docker run -d --name sparklebot-test \
            -e SLACK_BOT_TOKEN=xoxb-test \
            -e SLACK_SIGNING_SECRET=test \
            -e SLACK_APP_TOKEN=xapp-test \
            sparklebot:ci
          sleep 3
          if docker inspect sparklebot-test --format='{{.State.Running}}' | grep -q true; then
            echo "Container is running"
          else
            echo "Container failed to start, logs:"
            docker logs sparklebot-test
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: docker stop sparklebot-test 2>/dev/null || true

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v4

      - run: helm lint helm/sparklebot/

      - run: helm template sparklebot helm/sparklebot/ > /dev/null
