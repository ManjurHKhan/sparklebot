apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sparklebot.fullname" . }}
  labels:
    {{- include "sparklebot.labels" . | nindent 4 }}
data:
  SPARKLE_CURRENCY: {{ .Values.sparkle.currency | quote }}
  SPARKLE_CURRENCY_PLURAL: {{ .Values.sparkle.currencyPlural | quote }}
  SPARKLE_EMOJI: {{ .Values.sparkle.emoji | quote }}
  SPARKLE_PERSONALITY: {{ .Values.sparkle.personality | quote }}
  SPARKLE_PARTY_MINUTES: {{ .Values.sparkle.partyMinutes | quote }}
