apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sparklebot.fullname" . }}
  labels:
    {{- include "sparklebot.labels" . | nindent 4 }}
data:
  SPARKLE_CURRENCY: {{ .Values.sparkle.currency | quote }}
  SPARKLE_CURRENCY_PLURAL: {{ .Values.sparkle.currencyPlural | quote }}
  SPARKLE_EMOJI: {{ .Values.sparkle.emoji | quote }}
  SPARKLE_PERSONALITY: {{ .Values.sparkle.personality | quote }}
  SPARKLE_COLOR_PRIMARY: {{ .Values.sparkle.colorPrimary | quote }}
  SPARKLE_COLOR_ACCENT: {{ .Values.sparkle.colorAccent | quote }}
  SPARKLE_LOGO_URL: {{ .Values.sparkle.logoUrl | quote }}
  SPARKLE_PARTY_MINUTES: {{ .Values.sparkle.partyMinutes | quote }}
  SPARKLE_BATCH_INITIAL_SECONDS: {{ .Values.sparkle.batchInitialSeconds | quote }}
  SPARKLE_BATCH_EXTEND_SECONDS: {{ .Values.sparkle.batchExtendSeconds | quote }}
  SPARKLE_BATCH_MAX_SECONDS: {{ .Values.sparkle.batchMaxSeconds | quote }}
