apiVersion: v1
kind: Service
metadata:
  name: {{ include "sparklebot.fullname" . }}
  labels:
    {{- include "sparklebot.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    {{- include "sparklebot.selectorLabels" . | nindent 4 }}
