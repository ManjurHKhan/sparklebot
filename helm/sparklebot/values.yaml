# WARNING: Do not scale beyond 1 replica. SQLite does not support concurrent writers.
replicaCount: 1

image:
  repository: ghcr.io/manjurhkhan/sparklebot
  tag: ""  # defaults to chart appVersion
  pullPolicy: IfNotPresent

persistence:
  enabled: true
  size: 5Gi
  storageClass: ceph-block
  accessMode: ReadWriteOnce

slack:
  # References to existing K8s Secret (not created by this chart)
  existingSecret: sparklebot-slack
  botTokenKey: bot-token
  signingSecretKey: signing-secret
  appTokenKey: app-token

sparkle:
  currency: sparkle
  currencyPlural: sparkles
  emoji: ""
  personality: playful
  partyMinutes: 30

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext: {}

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
